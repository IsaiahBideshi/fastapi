{% extends "authenticated-base.html" %}

{% block additional_styles %}

{% endblock %}

{% block subpage_content %}

<table>
    <thead class="table table-striped">
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
    </thead>
    <tbody>
        {% for user in all_users %}
            <tr>{{user.id}}</tr>
            <tr>{{user.username}}</tr>
            <tr>{{user.email}}</tr>
        {%endfor%}
    </tbody>
</table>

{% endblock %}
